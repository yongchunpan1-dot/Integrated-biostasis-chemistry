name: Generate IBC Formulations

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pandas numpy

      - run: mkdir -p outputs

      - name: Sync evidence into state matrix
        run: |
          python scripts/sync_state_evidence.py \
            --output outputs/state_coverage_matrix_evidence_synced.csv

      - name: Generate stratified formulations
        run: |
          cp outputs/state_coverage_matrix_evidence_synced.csv knowledgebase/state_coverage_matrix.csv
          python ranking/generate_formulations.py \
            --top 48 \
            --output outputs/top48_formulations.csv

      - uses: actions/upload-artifact@v4
        with:
          name: ibc-formulation-outputs
          path: |
            outputs/top48_formulations.csv
            outputs/state_coverage_matrix_evidence_synced.csv
