name: Update Literature Library

on:
  workflow_dispatch:

jobs:
  mine:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pandas requests

      - name: Create outputs directory
        run: |
          mkdir -p outputs

      - name: Run literature mining
        run: |
          python workflows/build_literature_library.py

      - name: Upload mined literature
        uses: actions/upload-artifact@v4
        with:
          name: literature-materials
          path: outputs/literature_materials_mined.csv

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: literature-summary
          path: outputs/mining_summary.csv
